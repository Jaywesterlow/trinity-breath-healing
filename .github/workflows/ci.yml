name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          PUBLIC_SITE_URL: https://trinity-breath-healing.vercel.app

      - name: Unit tests
        run: npm run test:unit -- --run

      - name: CSS shape gate — no shared CSS beyond global.css (FND-02)
        run: bash scripts/no-shared-css.sh

      - name: Token enforcement — all colour/spacing/font vars from tokens (FND-04)
        run: bash scripts/check-tokens.sh

      - name: robots.txt order — AI bots before wildcard (SEO-08)
        run: bash scripts/check-robots.sh

      - name: HTML audit — H1, meta, canonical, hreflang, OG, Twitter, landmarks, font preload, landing <time datetime> (SEO-09/SEO-11/WARNING-3/BLOCKER-5)
        run: npm run audit:html
        env:
          PUBLIC_SITE_URL: https://trinity-breath-healing.vercel.app

      - name: Copy preservation gate — locked Figma copy in rendered HTML (LND-09, LND-10)
        run: bash scripts/check-copy.sh

      - name: JSON-LD audit — schema types, WebPage.dateModified, FAQPage policy (SCH-08/SEO-09/WARNING-2)
        run: npm run audit:json-ld

      - name: Placeholder grep (informational — non-blocking until Phase 4 / LGL-11)
        run: bash scripts/grep-placeholders.sh
        continue-on-error: true

      - name: Upload prerendered output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prerendered-pages
          path: .svelte-kit/output/prerendered/

  lighthouse-and-a11y:
    runs-on: ubuntu-latest
    needs: build-and-audit
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      deployments: read
      statuses: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Detect Vercel preview URL
        uses: actions/github-script@v7
        id: preview-url
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const sha   = context.payload.pull_request.head.sha;
            let url = '';
            for (let i = 0; i < 10; i++) {
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner, repo, sha, environment: 'Preview'
              });
              if (deployments.length > 0) {
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner, repo, deployment_id: deployments[0].id
                });
                const success = statuses.find(s => s.state === 'success');
                if (success?.environment_url) {
                  url = success.environment_url;
                  break;
                }
              }
              await new Promise(r => setTimeout(r, 30000));
            }
            if (!url) core.setFailed('Vercel preview URL not found after 10 attempts (5 min)');
            core.setOutput('url', url);

      - name: Lighthouse CI — LCP/CLS/SEO/A11y budgets (PRF-08)
        run: npx -y @lhci/cli@latest autorun --config=./lighthouserc.json --collect.url=${{ steps.preview-url.outputs.url }}
        continue-on-error: true

      - name: pa11y-ci — WCAG 2.2 AA (A11Y-05)
        run: |
          npx -y pa11y-ci --sitemap ${{ steps.preview-url.outputs.url }}/sitemap.xml \
            --config .pa11yci.json
        continue-on-error: true

      - name: structured-data-testing-tool — Rich Results runtime validation (SCH-08)
        run: npx -y structured-data-testing-tool --url ${{ steps.preview-url.outputs.url }}
        continue-on-error: true

  playwright-integration:
    runs-on: ubuntu-latest
    needs: build-and-audit
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build (for prerendered output)
        run: npm run build
        env:
          PUBLIC_SITE_URL: https://trinity-breath-healing.vercel.app

      - name: Playwright integration tests (routes + html-audit + synthetic-violations)
        run: npm run test:integration
        env:
          PUBLIC_SITE_URL: https://trinity-breath-healing.vercel.app
