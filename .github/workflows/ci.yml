name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build
        env:
          PUBLIC_SITE_URL: https://trinity-breath-healing.vercel.app

      - name: Audit HTML structure
        run: npm run audit:html
        # wired in Plan 00-08

      - name: Validate JSON-LD
        run: npm run audit:json-ld
        # wired in Plan 00-08

      - name: Test HTML audit
        run: npm run test:html-audit
        # wired in Plan 00-08

  lighthouse-and-a11y:
    runs-on: ubuntu-latest
    needs: build-and-audit
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Get Vercel preview URL
        uses: actions/github-script@v7
        id: preview-url
        with:
          script: |
            // Polls GitHub deployments API for Vercel preview URL
            // wired in Plan 00-08
            core.setOutput('url', '');

      - name: Run Lighthouse CI
        run: echo "lhci autorun placeholder — wired in Plan 00-08"
        # wired in Plan 00-08

      - name: Run pa11y-ci
        run: echo "pa11y-ci placeholder — wired in Plan 00-08"
        # wired in Plan 00-08
